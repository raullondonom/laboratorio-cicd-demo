name: ci-develop

# Se ejecuta cuando alguien abre o actualiza un PR cuya rama destino es `develop`.
on:
  pull_request:
    branches: [develop]

permissions:
  contents: read

jobs:
  lint-backend:
    name: Lint backend (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12.10"
          cache: pip
          cache-dependency-path: normal/backend/requirements.txt
      - name: Instalar dependencias
        working-directory: normal/backend
        run: pip install -r requirements.txt
      - name: Ejecutar ruff
        working-directory: normal/backend
        run: ruff check app

  lint-frontend:
    name: Lint frontend (eslint)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: normal/frontend/package-lock.json
      - name: Instalar dependencias
        working-directory: normal/frontend
        run: npm ci
      - name: Ejecutar eslint
        working-directory: normal/frontend
        run: npm run lint

  test-backend:
    name: Pruebas backend (sin gate de cobertura)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12.10"
          cache: pip
          cache-dependency-path: normal/backend/requirements.txt
      - name: Instalar dependencias
        working-directory: normal/backend
        run: pip install -r requirements.txt
      - name: pytest
        working-directory: normal/backend
        run: pytest -q

  build-frontend:
    name: Build frontend (vite)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: normal/frontend/package-lock.json
      - name: Instalar dependencias
        working-directory: normal/frontend
        run: npm ci
      - name: Build
        working-directory: normal/frontend
        run: npm run build
