# --- Identificadores del proyecto en SonarCloud ---
# Cada pareja debe reemplazar estos dos valores con los que SonarCloud asigna
# cuando importa el repo (Project Information -> Project Key / Organization).
sonar.projectKey=raullondonom_laboratorio-cicd-demo
sonar.organization=raullondonom

sonar.projectName=Laboratorio CI/CD
sonar.projectVersion=1.0

# --- Fuentes y tests ---
sonar.sources=normal/backend/app,normal/frontend/src
sonar.tests=normal/backend/tests,normal/frontend/src/__tests__

# Excluir directorios que no son código de la aplicación
sonar.exclusions=**/__pycache__/**,**/.venv/**,**/node_modules/**,**/dist/**,**/coverage/**

# --- Lenguajes ---
sonar.python.version=3.12

# --- Reportes de cobertura ---
sonar.python.coverage.reportPaths=normal/backend/coverage.xml
sonar.javascript.lcov.reportPaths=normal/frontend/coverage/lcov.info

# Lo que Sonar NO debe considerar para porcentaje de cobertura
sonar.coverage.exclusions=**/tests/**,**/__tests__/**,**/main.tsx,**/setupTests.ts,**/__init__.py

# --- Codificación ---
sonar.sourceEncoding=UTF-8
