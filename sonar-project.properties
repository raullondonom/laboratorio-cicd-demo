# --- Identificadores del proyecto en SonarCloud ---
# Cada pareja debe reemplazar estos dos valores con los que SonarCloud asigna
# cuando importa el repo (Project Information -> Project Key / Organization).
sonar.projectKey=raullondonom_laboratorio-cicd-demo
sonar.organization=raullondonom

sonar.projectName=Laboratorio CI/CD
sonar.projectVersion=1.0

# --- Fuentes y tests ---
sonar.sources=backend/app,frontend/src
sonar.tests=backend/tests,frontend/src/__tests__

# Excluir directorios que no son codigo de la aplicacion. Los tests se declaran
# arriba en sonar.tests y NO deben estar en sources (conjuntos disjuntos).
sonar.exclusions=**/__pycache__/**,**/.venv/**,**/node_modules/**,**/dist/**,**/coverage/**,**/__tests__/**,**/setupTests.ts

# --- Lenguajes ---
sonar.python.version=3.12

# --- Reportes de cobertura ---
sonar.python.coverage.reportPaths=backend/coverage.xml
sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info

# Lo que Sonar NO debe considerar para porcentaje de cobertura
sonar.coverage.exclusions=**/tests/**,**/__tests__/**,**/main.tsx,**/setupTests.ts,**/__init__.py

# --- Codificación ---
sonar.sourceEncoding=UTF-8
