[tool.ruff]
line-length = 100
target-version = "py312"
extend-exclude = ["tests"]

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP"]
ignore = []

[tool.ruff.lint.flake8-bugbear]
# `Depends(...)` y `Query(...)` son patrones idiomaticos de FastAPI, no bugs.
extend-immutable-calls = ["fastapi.Depends", "fastapi.Query", "fastapi.Path", "fastapi.Header"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q"
filterwarnings = [
    "ignore::DeprecationWarning",
]

[tool.coverage.run]
source = ["app"]
omit = [
    "app/__init__.py",
]

[tool.coverage.report]
show_missing = true
skip_covered = false
